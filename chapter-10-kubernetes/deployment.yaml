# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nawex-fraud-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nawex-fraud-api
  template:
    metadata:
      labels:
        app: nawex-fraud-api
    spec:
      containers:
      - name: fraud-api
        image: nawex-fraud-api:v1.0
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
