# docker-compose.yml
version: '3.8'
services:
  fraud-api:
    build: .
    image: nawex-fraud-api:v1.0
    ports: ['5000:5000']
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD","curl","-f",
        "http://localhost:5000/health"]
      interval: 30s
      retries: 3
